<!DOCTYPE html>
<html>
<head>

<title>Cart</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h2>Shopping Cart</h2>

</header>

<div class="cart-container" id="cart-container"></div>

<button onclick="checkout()">Checkout with WhatsApp</button>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let container=document.getElementById("cart-container");

let total=0;

cart.forEach(p=>{

total+=p.price;

container.innerHTML+=`
<div class="cart-item">
${p.name} - Tsh ${p.price}
</div>
`;

});

container.innerHTML+=`<h3>Total: Tsh ${total}</h3>`;

function checkout(){

let message="Hello Yohana Fashion,%0AOrder:%0A";

cart.forEach(p=>{
message+=p.name+" - Tsh "+p.price+"%0A";
});

message+="Total: Tsh "+total;

window.open("https://wa.me/255715029419?text="+message);

}

</script>

</body>
</html>

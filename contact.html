<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contact — Yohana Fashion</title>
  <meta name="description" content="Contact Yohana Fashion for projects and orders">
  <link rel="icon" href="/images/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="/">yohana fashion</a>
      <nav class="site-nav" id="site-nav">
        <a href="/">Home</a>
        <a href="/about.html">About</a>
        <a href="/collections.html">Collections</a>
        <a href="/shop.html">Shop</a>
        <a href="/contact.html">Contact</a>
      </nav>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">☰</button>
    </div>
  </header>

  <main class="container">
    <h1>Contact</h1>
    <img src="/images/storebanner.jpg" alt="Store banner" style="width:100%;border-radius:10px;margin-bottom:18px;object-fit:cover">
    <p>If you'd like to work together or have questions, send a message below or email <a href="mailto:hello@example.com">hello@example.com</a>.</p>

    <form id="contact-form" class="contact-form" action="#" method="post" novalidate>
      <label>
        Name
        <input type="text" name="name" required>
      </label>
      <label>
        Email
        <input type="email" name="email" required>
      </label>
      <label>
        Message
        <textarea name="message" rows="6" required></textarea>
      </label>
      <p><button class="btn" type="submit">Send message</button></p>
      <p id="form-status" class="muted"></p>
    </form>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; <span id="year"></span> yohana fashion. Built with care.</p>
    </div>
  </footer>

  <script src="/script.js"></script>
</body>
</html>

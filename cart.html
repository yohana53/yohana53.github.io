<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cart | Yohana Fashion</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">Yohana Fashion</div>

<nav>

<ul>

<li><a href="index.html">Home</a></li>

<li><a href="shop.html">Shop</a></li>

</ul>

</nav>

</header>

<div class="cart-container">

<h1>Your Cart</h1>

<div id="cart-items"></div>

<h3>Total: TSh <span id="total"></span></h3>

<a id="checkout" class="btn whatsapp-btn">Checkout via WhatsApp</a>

</div>

<script>

let cart=JSON.parse(localStorage.getItem("cart"))||[]

let container=document.getElementById("cart-items")

let total=0

cart.forEach(item=>{

total+=item.price

container.innerHTML+=`

<div class="cart-item">

<img src="${item.image}">

<div>

<h3>${item.name}</h3>

<p>TSh ${item.price.toLocaleString()}</p>

</div>

</div>

`

})

document.getElementById("total").textContent=total.toLocaleString()

let text=cart.map(p=>p.name).join(",")

document.getElementById("checkout").href=

`https://wa.me/255715029419?text=Hello I want to order: ${encodeURIComponent(text)}`

</script>

</body>

</html>
